name: shouts_and_whispers
description: "Hyperlocal messaging: whispers (150 m) and shouts (1,500 m) delivered only to the people physically near you at the moment you send."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  cloud_firestore: ^6.6.0
  cloud_functions: ^6.3.3
  firebase_auth: ^6.5.4
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  flutter:
    sdk: flutter
  flutter_map: ^8.3.1
  geolocator: ^14.0.3
  google_sign_in: ^7.2.0
  intl: ^0.20.3
  latlong2: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
